    <script>
        const chatBox = document.getElementById('chatBox');
        const userInput = document.getElementById('userInput');
        const typing = document.getElementById('typing');
        
        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }
        
        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `message ${isUser ? 'user' : 'bot'}`;
                        div.innerHTML = `${text}<div class="time">現在</div>`;
            chatBox.appendChild(div);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
        
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;
            
            // Add user message
            addMessage(text, true);
            userInput.value = '';
            
            // Show typing
            typing.style.display = 'block';
                        chatBox.scrollTop = chatBox.scrollHeight;
            
            try {
                // Call OpenClaw API (需要改成你既API)
                const response = await fetch('http://127.0.0.1:18789/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        message: text,
                        model: 'minimax/MiniMax-M2.5'
                    })
                });
                
                const data = await response.json();
                addMessage(data.reply || 'sorry, 我答唔到...', false);
                            } catch (error) {
                // 如果API唔work，用simulated response
                addMessage('暂时连接不到AI，请稍后再试。或者你可以加入Forum同我地既社区倾偈！', false);
            }
            
            // Hide typing
            typing.style.display = 'none';
        }
    </script>
</body>
</html>
